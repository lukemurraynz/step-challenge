apiVersion: v1
kind: ContinuousQuery
name: race-to-goal
spec:
  mode: query
  sources:
    subscriptions:
      - id: stepup
        nodes:
          - sourceLabel: participants
          - sourceLabel: step_logs
    joins:
      - id: HAS_LOG
        keys:
          - label: participants
            property: id
          - label: step_logs
            property: participant_id
  query: >
    MATCH
      (p:participants)-[:HAS_LOG]->(s:step_logs)
    WITH
      p,
      sum(s.steps) AS total
    WHERE
      total >= p.target
    RETURN
      p.id AS id,
      p.name AS name,
      total,
      p.target AS target