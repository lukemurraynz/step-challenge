apiVersion: v1
kind: ContinuousQuery
name: daily-smashed
spec:
  mode: query
  sources:
    subscriptions:
      - id: stepup
        nodes:
          - sourceLabel: participants
          - sourceLabel: step_logs
          - sourceLabel: challenge_state
    joins:
      - id: HAS_LOG
        keys:
          - label: participants
            property: id
          - label: step_logs
            property: participant_id
      - id: ON_TODAY
        keys:
          - label: step_logs
            property: log_date
          - label: challenge_state
            property: today
  query: >
    MATCH
      (p:participants)-[:HAS_LOG]->(s:step_logs)-[:ON_TODAY]->(c:challenge_state)
    WITH
      p, c.daily_target AS target, sum(s.steps) AS total
    WHERE
      total >= target
    RETURN
      p.id AS id, p.name AS name, total, target